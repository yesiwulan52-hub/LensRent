    <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>LensRent - Sistem Penyewaan Alat Fotografi</title>
    <style>
        body{
            font-family: Arial;
            margin:0;
        }

        header{
            background-color: #EEFABD;
            background-size: cover;
            background-position: center;
            color:rgb(7, 6, 40);
            padding:90px;
            text-align:center;
        }

        #logo_lensrent{
            float:left;
            margin-top: -60px;
            width: 30%;
        }

        nav{
            background: #A0D585;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:rgb(7, 6, 40);
            margin:10px;
            text-decoration:none;
            font-weight:bold;
        }

        main{
            display:flex;
        }

        section{
            flex:3;
            padding:20px;
        }

        footer{
            background:#A0D585;
            color:white;
            text-align:center;
            padding:10px;
        }

    </style>
</head>

<body>
    
<header>
    <img id= "logo_lensrent" src="logo_lensrent.png" width="180">
    <h1>Sistem Penyewaan Alat Fotografi</h1>
</header>

<nav>
    <a href=""></a>
</nav>

<body>
    <h2>Form Penyewaan</h2>
    <form>
    Id Penyewaan<br>
    <input type="number" name="id"><br>
    Kode Kamera<br>
    <input type="text" name="kode"><br>
    Nama Penyewa<br>
    <input type="text" name="nama"><br>
    No. Telepon<br>
    <input type="text" name="telepon"><br><br>
    Pilih Kamera<br>
    <select name="kamera">
    <option>Fujifilm X100F</option>
    <option>Sony A7 III</option>
    <option>Canon R5</option>
    <option>Nikon D750</option>
    <option>Canon 80D</option>
    </select><br><br>
    Tanggal Sewa<br>
    <input type="date" name="tanggal_sewa"><br><br>
    Tanggal Kembali<br>
    <input type="date" name="tanggal_kembali"><br><br>
    Jumlah Unit<br>
    <input type="number" name="jumlah"><br><br>
    Metode Pembayaran<br>
    <select name="pembayaran">
    <option>Transfer Bank</option>
    <option>Cash</option>
    <option>E-Wallet</option>
    </select><br><br>
    Catatan<br>
    <input type="text" name="catatan"><br><br>
    <button type="submit">Simpan Penyewaan</button>

    </form>
    <a href="index.html">Kembali</a>

<footer>
<p> </p>
</footer>

</body>
</html>
