    <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>LensRent - Sistem Penyewaan Alat Fotografi</title>
    <style>
        body{
            font-family: Arial;
            margin:0;
        }

        header{
            background-color: #EEFABD;
            background-size: cover;
            background-position: center;
            color:rgb(7, 6, 40);
            padding:90px;
            text-align:center;
        }

        #logo_lensrent{
            float:left;
            margin-top: -60px;
            width: 30%;
        }

        nav{
            background: #A0D585;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:rgb(7, 6, 40);
            margin:10px;
            text-decoration:none;
            font-weight:bold;
        }

        main{
            display:flex;
        }

        section{
            flex:3;
            padding:20px;
        }

        footer{
            background:#A0D585;
            color:white;
            text-align:center;
            padding:10px;
        }

    </style>
</head>

<body>    
    <header>
        <img id= "logo_lensrent" src="logo_lensrent.png" width="180">
        <h1>Sistem Penyewaan Alat Fotografi</h1>
    </header>

    <nav>
        <div class="logo">
            <img src="logo_lensrent.png">
            <b>LensRent</b>
        </div>

        <div class="menu">
            <a href="index.html">Home</a>
            <a href="datakamera.html">Data Kamera</a>
            <a href="formsewa.html">Sewa</a>
        </div>
    </nav>

    <header>
        <h1>Form Penyewaan Kamera</h1>
    </header>

    <section>

    <form>

    ID Penyewaan
    <input type="number" name="id">

    Nama Penyewa
    <input type="text" name="nama">

    No. Telepon
    <input type="text" name="telepon">

    Pilih Kamera
    <select>
    <option>Fujifilm X100F</option>
    <option>Sony A7 III</option>
    <option>Canon R5</option>
    <option>Nikon D750</option>
    <option>Canon 80D</option>
    </select>

    Tanggal Sewa
    <input type="date">

    Tanggal Kembali
    <input type="date">

    Jumlah Unit
    <input type="number">

    Metode Pembayaran
    <select>
    <option>Transfer Bank</option>
    <option>Cash</option>
    <option>E-Wallet</option>
    </select>

    Catatan
    <input type="text">

    <button type="submit">Simpan</button>

    </form>

    </section>

    <footer>
        <div>© 2026 LensRent</div>
        <div>Instagram | WhatsApp</div>
        <div>Support</div>
    </footer>
</body>
</html>
